<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Clientes y Cobranzas</title>

<link rel="stylesheet" href="styles.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="manifest" href="manifest.json">

</head>

<body>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwVHS8mCahNTL4IzE8_aSrYpm1mNedjEmLOXdaey-fhryGt5ilCNswbvUX5sd2iQM7pUQ/exec";

// registrar service worker de forma segura
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js").catch(err => console.log('ServiceWorker registration failed:', err));
}

let CLIENTES = [];
let VENTAS = [];
let PAGOS = [];
let VISITAS = [];

/* =========================
   INICIALIZACIÓN
========================= */

document.addEventListener("DOMContentLoaded", () => {
    cargarTodo();
});

async function cargarTodo() {
    await Promise.all([
        cargarClientes(),
        cargarVentas(),
        cargarPagos(),
        cargarVisitas()
    ]);

    renderDashboard();
    renderClientes();
    renderVentas();
    renderPagos();
    cargarSelects();
    renderVisitas();
}



/* =========================
   API FETCH
========================= */

async function apiGet(action) {
    try {
        const res = await fetch(`${API_URL}?action=${action}`);
        return await res.json();
    } catch (err) {
        console.error('apiGet failed', err);
        throw new Error('No se pudo obtener datos del servidor. Revisa CORS o la disponibilidad del API.');
    }
}

async function apiPost(data) {

    const formData = new URLSearchParams();

    for (let key in data) {
        formData.append(key, data[key]);
    }

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: formData
        });

        return await res.json();
    } catch (err) {
        console.error('apiPost failed (attempt POST):', err);
        // Intentar fallback a GET (algunas implementaciones de Apps Script aceptan GET para escritura)
        try {
            const params = new URLSearchParams(data).toString();
            const res2 = await fetch(API_URL + "?" + params);
            return await res2.json();
        } catch (err2) {
            console.error('apiPost fallback GET failed:', err2);
            throw new Error('No se pudo contactar al servidor (CORS). Revisa la configuración del Apps Script o usa un proxy con CORS habilitado.');
        }
    }
}


/* =========================
   CARGA DE DATOS
========================= */

async function cargarClientes() {
    CLIENTES = await apiGet("clientes");
}

async function cargarVentas() {
    VENTAS = await apiGet("ventas");
}

async function cargarPagos() {
    PAGOS = await apiGet("pagos");
}

async function cargarVisitas() {
    VISITAS = await apiGet("visitas");
}

/* =========================
   DASHBOARD
========================= */

function renderDashboard() {
    let totalVentas = 0;
    let totalPagos = 0;

    VENTAS.slice(1).forEach(v => totalVentas += Number(v[4]) || 0);
    PAGOS.slice(1).forEach(p => totalPagos += Number(p[3]) || 0);

    const saldo = totalVentas - totalPagos;

    const elTotalClientes = document.getElementById("totalClientes");
    if (elTotalClientes) elTotalClientes.innerText = (CLIENTES.length - 1).toString();

    const elTotalVentas = document.getElementById("totalVentas");
    if (elTotalVentas) elTotalVentas.innerText = "$" + totalVentas.toLocaleString();

    const elTotalPagos = document.getElementById("totalPagos");
    if (elTotalPagos) elTotalPagos.innerText = "$" + totalPagos.toLocaleString();

    const elSaldoGeneral = document.getElementById("saldoGeneral");
    if (elSaldoGeneral) elSaldoGeneral.innerText = "$" + saldo.toLocaleString();

    if (typeof renderVencidos === 'function') renderVencidos();
}

/* =========================
   CLIENTES
========================= */

function renderClientes() {
    const tbody = document.getElementById("tablaClientes");
    if (!tbody) return;
    tbody.innerHTML = "";

    CLIENTES.slice(1).forEach(c => {

        const id = c[0];
        const nombre = c[1];
        const telefono = c[2];
        const email = c[3];
        const diasCredito = Number(c[7]) || 0;

        const saldo = calcularSaldoCliente(id);

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${nombre}</td>
            <td>${telefono}</td>
            <td>${email}</td>
            <td>${diasCredito}</td>
            <td>$${saldo}</td>
            <td>
                <button onclick="verCuenta(${id})">Ver</button>
            </td>
        `;

        tbody.appendChild(tr);
    });
}

/* =========================
   VENTAS
========================= */

function renderVentas() {
    const tbody = document.getElementById("tablaVentas");
    if (!tbody) return;
    tbody.innerHTML = "";

    VENTAS.slice(1).forEach(v => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${v[2]}</td>
            <td>${getNombreCliente(v[1])}</td>
            <td>${v[3]}</td>
            <td>$${v[4]}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* =========================
   PAGOS
========================= */

function renderPagos() {
    const tbody = document.getElementById("tablaPagos");
    if (!tbody) return;
    tbody.innerHTML = "";

    PAGOS.slice(1).forEach(p => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${p[2]}</td>
            <td>${getNombreCliente(p[1])}</td>
            <td>$${p[3]}</td>
            <td>${p[4]}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* =========================
   VISITAS
========================= */

function renderVisitas() {
    const tbody = document.getElementById("tablaVisitas");
    if (!tbody) return;
    tbody.innerHTML = "";

    VISITAS.slice(1).forEach(v => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${v[2]}</td>
            <td>${v[3]}</td>
            <td>${getNombreCliente(v[1])}</td>
            <td>${v[4]}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* =========================
   CUENTA CORRIENTE
========================= */

function calcularSaldoCliente(clienteID) {

    let ventas = 0;
    let pagos = 0;

    VENTAS.slice(1).forEach(v => {
        if (v[1] == clienteID) ventas += Number(v[4]) || 0;
    });

    PAGOS.slice(1).forEach(p => {
        if (p[1] == clienteID) pagos += Number(p[3]) || 0;
    });

    return ventas - pagos;
}

/* =========================
   HELPERS
========================= */

function getNombreCliente(id) {
    const c = CLIENTES.find(x => x[0] == id);
    return c ? c[1] : "Desconocido";
}

/* =========================
   MODALES (BÁSICO)
========================= */

function abrirModalCliente() {
    const el = document.getElementById("modalCliente"); if (el) el.style.display = "flex";
}

function abrirModalVenta() { const el = document.getElementById("modalVenta"); if (el) el.style.display = "flex"; }
function abrirModalPago() { const el = document.getElementById("modalPago"); if (el) el.style.display = "flex"; }
function abrirModalVisita() { const el = document.getElementById("modalVisita"); if (el) el.style.display = "flex"; }

function cerrarModal(id) {
    const el = document.getElementById(id); if (el) el.style.display = "none";
}

/* =========================
   GUARDAR CLIENTE
========================= */

async function guardarCliente() {

    const data = {
        action: "nuevoCliente",
        cliente: document.getElementById("clienteNombre") ? document.getElementById("clienteNombre").value : '',
        telefono: document.getElementById("clienteTelefono") ? document.getElementById("clienteTelefono").value : '',
        email: document.getElementById("clienteEmail") ? document.getElementById("clienteEmail").value : '',
        direccion: document.getElementById("clienteDireccion") ? document.getElementById("clienteDireccion").value : '',
        latitud: 0,
        longitud: 0,
        diasCredito: document.getElementById("clienteDiasCredito") ? document.getElementById("clienteDiasCredito").value : 0,
        observaciones: document.getElementById("clienteObservaciones") ? document.getElementById("clienteObservaciones").value : ''
    };

    // si estás editando
    if (window.CLIENTE_EDITANDO) {
        data.action = "editarCliente";
        data.id = window.CLIENTE_EDITANDO;
    }

    try {
        await apiPost(data);
    } catch (err) {
        alert(err.message);
        return;
    }

    window.CLIENTE_EDITANDO = null;

    cerrarModal("modalCliente");
    if (typeof limpiarModales === 'function') limpiarModales();
    cargarTodo();
}


/* =========================
   GUARDAR VENTA
========================= */

async function guardarVenta() {

    const data = {
        action: "nuevaVenta",
        clienteID: document.getElementById("ventaCliente") ? document.getElementById("ventaCliente").value : '',
        fecha: document.getElementById("ventaFecha") ? document.getElementById("ventaFecha").value : '',
        concepto: document.getElementById("ventaConcepto") ? document.getElementById("ventaConcepto").value : '',
        importe: document.getElementById("ventaImporte") ? document.getElementById("ventaImporte").value : 0
    };

    try { await apiPost(data); } catch (err) { alert(err.message); return; }

    cerrarModal("modalVenta");
    cargarTodo();
}

/* =========================
   GUARDAR PAGO
========================= */

    const data = {
        action: "nuevoPago",
        clienteID: document.getElementById("pagoCliente") ? document.getElementById("pagoCliente").value : '',
        fecha: document.getElementById("pagoFecha") ? document.getElementById("pagoFecha").value : '',
        importe: document.getElementById("pagoImporte") ? document.getElementById("pagoImporte").value : 0,
        metodoPago: document.getElementById("pagoMetodo") ? document.getElementById("pagoMetodo").value : '',
        observaciones: document.getElementById("pagoObservaciones") ? document.getElementById("pagoObservaciones").value : ''
    };

    try { await apiPost(data); } catch (err) { alert(err.message); return; }

    cerrarModal("modalPago");
    cargarTodo();
}

/* =========================
   GUARDAR VISITA
========================= */

async function guardarVisita() {

    const data = {
        action: "nuevaVisita",
        clienteID: document.getElementById("visitaCliente") ? document.getElementById("visitaCliente").value : '',
        fecha: new Date().toISOString().split("T")[0],
        hora: new Date().toLocaleTimeString(),
        observacion: document.getElementById("visitaObservacion") ? document.getElementById("visitaObservacion").value : '',
        latitud: 0,
        longitud: 0
    };

    try { await apiPost(data); } catch (err) { alert(err.message); return; }

    cerrarModal("modalVisita");
    cargarTodo();
}

/* =========================
   CUENTA DETALLE
========================= */

function verCuenta(id) {
    alert("Cuenta cliente ID: " + id + "\n(Próximo bloque: vista completa + PDF)");
}

/* =========================
   NAVEGACIÓN
========================= */

function mostrarSeccion(id) {

    document.querySelectorAll(".seccion")
        .forEach(s => s.classList.remove("visible"));

    const el = document.getElementById(id); if (el) el.classList.add("visible");
}


function cargarSelects() {

    const selects = [
        "ventaCliente",
        "pagoCliente",
        "visitaCliente",
        "clientePDF"
    ];

    selects.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        el.innerHTML = "<option value=''>Seleccionar cliente</option>";

        (CLIENTES.slice(1) || []).forEach(c => {
            const option = document.createElement("option");
            option.value = c[0];
            option.textContent = c[1];
            el.appendChild(option);
        });
    });
}


function obtenerCuentaCliente(clienteID) {

    let movimientos = [];

    // VENTAS
    VENTAS.slice(1).forEach(v => {
        if (v[1] == clienteID) {
            movimientos.push({
                tipo: "venta",
                fecha: v[2],
                descripcion: v[3],
                importe: Number(v[4])
            });
        }
    });

    // PAGOS
    PAGOS.slice(1).forEach(p => {
        if (p[1] == clienteID) {
            movimientos.push({
                tipo: "pago",
                fecha: p[2],
                descripcion: p[4],
                importe: Number(p[3])
            });
        }
    });

    // ORDENAR POR FECHA
    movimientos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    let saldo = 0;

    movimientos = movimientos.map(m => {

        if (m.tipo === "venta") saldo += m.importe;
        if (m.tipo === "pago") saldo -= m.importe;

        return {
            ...m,
            saldo
        };

    });

    return movimientos;
}



function verCuenta(clienteID) {

    const cliente = CLIENTES.find(c => c[0] == clienteID) || [];

    const movimientos = obtenerCuentaCliente(clienteID);

    let html = `
        <h2>${cliente[1] || 'Cliente'}</h2>
        <h4>Cuenta Corriente</h4>

        <table style="width:100%; margin-top:15px;">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Importe</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody>
`;

    movimientos.forEach(m => {
        html += `<tr><td>${m.fecha}</td><td>${m.tipo}</td><td>${m.descripcion}</td><td>$${m.importe}</td><td>$${m.saldo}</td></tr>`;
    });

    html += `</tbody></table>`;

    // mostrar en modal simple
    const modal = document.getElementById('modalCuenta');
    if (modal) {
        modal.querySelector('.modal-content').innerHTML = html + '<div class="acciones"><button onclick="cerrarModal(\'modalCuenta\')" class="btn-secundario">Cerrar</button></div>';
        modal.style.display = 'flex';
    } else {
        // fallback
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
    }
}

</script>
