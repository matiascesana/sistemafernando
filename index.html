<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Clientes</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#111827;
color:white;
padding:20px;
position:fixed;
height:100%;
}

.sidebar h2{
color:#22c55e;
}

.menu button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
cursor:pointer;
background:#1f2937;
color:white;
border-radius:8px;
}

.menu button:hover{
background:#22c55e;
}

/* CONTENT */
.content{
margin-left:240px;
padding:20px;
width:100%;
}

.section{display:none;}
.section.active{display:block;}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
}

/* TABLE */
table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:400px;
border-radius:10px;
}

input,select,textarea{
width:100%;
margin:5px 0;
padding:8px;
}

button{
cursor:pointer;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>CRM</h2>

<div class="menu">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('clientes')">Clientes</button>
<button onclick="show('ventas')">Ventas</button>
<button onclick="show('pagos')">Pagos</button>
<button onclick="show('visitas')">Visitas</button>
<button onclick="show('reportes')">Reportes</button>
</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>

<div class="cards">
<div class="card">Clientes: <span id="tClientes">0</span></div>
<div class="card">Ventas: <span id="tVentas">0</span></div>
<div class="card">Pagos: <span id="tPagos">0</span></div>
<div class="card">Saldo: <span id="tSaldo">0</span></div>
</div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="section">

<h2>Clientes</h2>

<button onclick="openModal('clienteModal')">Nuevo Cliente</button>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Dirección</th>
<th>Saldo</th>
</tr>
</thead>
<tbody id="listaClientes"></tbody>
</table>

</div>

<!-- VENTAS -->
<div id="ventas" class="section">
<h2>Ventas</h2>
<button onclick="openModal('ventaModal')">Nueva Venta</button>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Concepto</th>
<th>Importe</th>
</tr>
</thead>
<tbody id="listaVentas"></tbody>
</table></div>

<!-- PAGOS -->
<div id="pagos" class="section">
<h2>Pagos</h2>
<button onclick="openModal('pagoModal')">Nuevo Pago</button>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Importe</th>
<th>Método</th>
</tr>
</thead>
<tbody id="listaPagos"></tbody>
</table>
</div>

<!-- VISITAS -->
<div id="visitas" class="section">
<h2>Visitas</h2>
<button onclick="openModal('visitaModal')">Nueva Visita</button>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Fecha</th>
<th>Hora</th>
<th>Observación</th>
</tr>
</thead>
<tbody id="listaVisitas"></tbody>
</table>
</div>

<!-- REPORTES -->
<div id="reportes" class="section">
<h2>Reportes</h2>

<button onclick="pdfCliente()">PDF Cliente</button>
<button onclick="pdfFechas()">PDF Fechas</button>

<input type="date" id="desde">
<input type="date" id="hasta">

</div>

</div>

</div>

<!-- MODAL CLIENTE -->
<div class="modal" id="clienteModal">
<div class="modal-content">
<h3>Cliente</h3>
<input id="cNombre" placeholder="Nombre">
<input id="cTel" placeholder="Teléfono">
<input id="cDireccion" placeholder="Dirección">
<input id="cObs" placeholder="Observaciones">

<button onclick="saveCliente()">Guardar</button>
<button onclick="closeModal('clienteModal')">Cerrar</button>
</div>
</div>

<!-- MODAL VENTA -->
<div class="modal" id="ventaModal">
<div class="modal-content">
<h3>Venta</h3>

<select id="vCliente"></select>
<input id="vConcepto" placeholder="Concepto">
<input id="vImporte" placeholder="Importe">

<button onclick="saveVenta()">Guardar</button>
</div>
</div>

<!-- MODAL PAGO -->
<div class="modal" id="pagoModal">
<div class="modal-content">
<h3>Pago</h3>

<select id="pCliente"></select>
<input id="pImporte" placeholder="Importe">
<input id="pMetodo" placeholder="Método de pago">
<input id="pObs" placeholder="Observaciones">

<button onclick="savePago()">Guardar</button>
</div>
</div>

<!-- MODAL VISITA -->
<div class="modal" id="visitaModal">
<div class="modal-content">
<h3>Visita</h3>

<select id="viCliente"></select>
<textarea id="viObs"></textarea>

<button onclick="saveVisita()">Guardar</button>
</div>
</div>

<script>

/* ================= API ================= */

const API_URL = "https://script.google.com/macros/s/AKfycbwVHS8mCahNTL4IzE8_aSrYpm1mNedjEmLOXdaey-fhryGt5ilCNswbvUX5sd2iQM7pUQ/exec";

let clientes = [];
let ventas = [];
let pagos = [];
let visitas = [];

function get(action){

  return new Promise((resolve,reject)=>{

    const callbackName =
    "jsonp_" + Date.now() + "_" + Math.random().toString(36).slice(2);

    const script =
    document.createElement("script");

    window[callbackName] = data=>{

      resolve(data);

      delete window[callbackName];
      script.remove();

    };

    script.onerror = ()=>{

      reject(
        new Error("No se pudo cargar la API")
      );

      delete window[callbackName];
      script.remove();

    };

    script.src =
    API_URL +
    "?action=" + encodeURIComponent(action) +
    "&callback=" + encodeURIComponent(callbackName);

    document.body.appendChild(script);

  });

}

function post(data){

  return new Promise(resolve=>{

    const iframe =
    document.createElement("iframe");

    iframe.name =
    "postFrame_" + Date.now();

    iframe.style.display = "none";

    const form =
    document.createElement("form");

    form.method = "POST";
    form.action = API_URL;
    form.target = iframe.name;
    form.style.display = "none";

    Object.entries(data).forEach(([key,value])=>{

      const input =
      document.createElement("input");

      input.type = "hidden";
      input.name = key;
      input.value = value ?? "";

      form.appendChild(input);

    });

    document.body.appendChild(iframe);
    document.body.appendChild(form);

    form.submit();

    setTimeout(()=>{

      form.remove();
      iframe.remove();

      resolve({
        ok:true
      });

    },1200);

  });

}

/* ================= UI ================= */

function show(id){
  document.querySelectorAll(".section")
  .forEach(s=>s.classList.remove("active"));

  document.getElementById(id).classList.add("active");
}

function openModal(id){
  document.getElementById(id).style.display = "flex";
}

function closeModal(id){
  document.getElementById(id).style.display = "none";
}

function nombreCliente(id){

  const cliente = clientes
  .slice(1)
  .find(c=>String(c[0]) === String(id));

  return cliente ? cliente[1] : id;

}

function dinero(valor){
  return "$" + Number(valor || 0).toLocaleString("es-AR");
}

/* ================= LOAD ================= */

async function load(){

  try{

    clientes = await get("clientes");
    ventas = await get("ventas");
    pagos = await get("pagos");
    visitas = await get("visitas");

    document.getElementById("tClientes").innerText =
    Math.max(clientes.length - 1, 0);

    document.getElementById("tVentas").innerText =
    Math.max(ventas.length - 1, 0);

    document.getElementById("tPagos").innerText =
    Math.max(pagos.length - 1, 0);

    const totalVentas = ventas
    .slice(1)
    .reduce((total,v)=>total + Number(v[4] || 0),0);

    const totalPagos = pagos
    .slice(1)
    .reduce((total,p)=>total + Number(p[3] || 0),0);

    document.getElementById("tSaldo").innerText =
    dinero(totalVentas - totalPagos);

    fillSelects();

    renderClientes();
    renderVentas();
    renderPagos();
    renderVisitas();

  }catch(error){

    console.error("Error cargando datos:",error);

    alert(
      "No se pudieron cargar los datos. Revisá la conexión o el Apps Script."
    );

  }

}

function fillSelects(){

  let selects = ["vCliente","pCliente","viCliente"];

  selects.forEach(id=>{

    let el = document.getElementById(id);

    if(!el){
      return;
    }

    el.innerHTML = "";

    clientes.slice(1).forEach(c=>{

      let opt = document.createElement("option");

      opt.value = c[0];
      opt.textContent = c[1];

      el.appendChild(opt);

    });

  });

}

/* ================= CLIENTES ================= */

function renderClientes(){

  let html = "";

  clientes.slice(1).forEach(c=>{

    html += `
    <tr>
      <td>${c[1] || ""}</td>
      <td>${c[2] || ""}</td>
      <td>${c[3] || ""}</td>
      <td>${saldoCliente(c[0])}</td>
    </tr>
    `;

  });

  document.getElementById("listaClientes").innerHTML = html;

}

function saldoCliente(clienteID){

  const totalVentas = ventas
  .slice(1)
  .filter(v=>String(v[1]) === String(clienteID))
  .reduce((total,v)=>total + Number(v[4] || 0),0);

  const totalPagos = pagos
  .slice(1)
  .filter(p=>String(p[1]) === String(clienteID))
  .reduce((total,p)=>total + Number(p[3] || 0),0);

  return dinero(totalVentas - totalPagos);

}

async function saveCliente(){

  try{

    await post({
      action:"nuevoCliente",
      cliente:document.getElementById("cNombre").value,
      telefono:document.getElementById("cTel").value,
      direccion:document.getElementById("cDireccion").value,
      observaciones:document.getElementById("cObs").value
    });

    closeModal("clienteModal");

    document.getElementById("cNombre").value = "";
    document.getElementById("cTel").value = "";
    document.getElementById("cDireccion").value = "";
    document.getElementById("cObs").value = "";

    load();

  }catch(error){

    console.error("Error guardando cliente:",error);
    alert("No se pudo guardar el cliente.");

  }

}

/* ================= VENTAS ================= */

function renderVentas(){

  let html = "";

  ventas.slice(1).forEach(v=>{

    html += `
    <tr>
      <td>${nombreCliente(v[1])}</td>
      <td>${v[2] || ""}</td>
      <td>${v[3] || ""}</td>
      <td>${dinero(v[4])}</td>
    </tr>
    `;

  });

  document.getElementById("listaVentas").innerHTML = html;

}

async function saveVenta(){

  try{

    await post({
      action:"nuevaVenta",
      clienteID:document.getElementById("vCliente").value,
      concepto:document.getElementById("vConcepto").value,
      importe:document.getElementById("vImporte").value
    });

    closeModal("ventaModal");

    document.getElementById("vConcepto").value = "";
    document.getElementById("vImporte").value = "";

    load();

  }catch(error){

    console.error("Error guardando venta:",error);
    alert("No se pudo guardar la venta.");

  }

}

/* ================= PAGOS ================= */

function renderPagos(){

  let html = "";

  pagos.slice(1).forEach(p=>{

    html += `
    <tr>
      <td>${nombreCliente(p[1])}</td>
      <td>${p[2] || ""}</td>
      <td>${dinero(p[3])}</td>
      <td>${p[4] || ""}</td>
    </tr>
    `;

  });

  document.getElementById("listaPagos").innerHTML = html;

}

async function savePago(){

  try{

    await post({
      action:"nuevoPago",
      clienteID:document.getElementById("pCliente").value,
      importe:document.getElementById("pImporte").value,
      metodoPago:document.getElementById("pMetodo").value,
      observaciones:document.getElementById("pObs").value
    });

    closeModal("pagoModal");

    document.getElementById("pImporte").value = "";
    document.getElementById("pMetodo").value = "";
    document.getElementById("pObs").value = "";

    load();

  }catch(error){

    console.error("Error guardando pago:",error);
    alert("No se pudo guardar el pago.");

  }

}

/* ================= VISITAS ================= */

function renderVisitas(){

  let html = "";

  visitas.slice(1).forEach(v=>{

    html += `
    <tr>
      <td>${nombreCliente(v[1])}</td>
      <td>${v[2] || ""}</td>
      <td>${v[3] || ""}</td>
      <td>${v[4] || ""}</td>
    </tr>
    `;

  });

  document.getElementById("listaVisitas").innerHTML = html;

}

async function saveVisita(){

  try{

    await post({
      action:"nuevaVisita",
      clienteID:document.getElementById("viCliente").value,
      observacion:document.getElementById("viObs").value
    });

    closeModal("visitaModal");

    document.getElementById("viObs").value = "";

    load();

  }catch(error){

    console.error("Error guardando visita:",error);
    alert("No se pudo guardar la visita.");

  }

}

/* ================= PDF ================= */

function pdfCliente(){

  const clienteID = prompt("Ingresá el ID del cliente");

  if(!clienteID){
    return;
  }

  const cliente = clientes
  .slice(1)
  .find(c=>String(c[0]) === String(clienteID));

  if(!cliente){
    alert("Cliente no encontrado.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 15;

  doc.setFontSize(16);
  doc.text("Reporte de Cliente",10,y);

  y += 12;

  doc.setFontSize(11);
  doc.text("Cliente: " + (cliente[1] || ""),10,y);
  y += 8;
  doc.text("Teléfono: " + (cliente[2] || ""),10,y);
  y += 8;
  doc.text("Dirección: " + (cliente[3] || ""),10,y);
  y += 8;
  doc.text("Saldo: " + saldoCliente(clienteID),10,y);

  y += 14;

  doc.text("Ventas:",10,y);
  y += 8;

  ventas.slice(1)
  .filter(v=>String(v[1]) === String(clienteID))
  .forEach(v=>{
    doc.text(
      `${v[2] || ""} - ${v[3] || ""} - ${dinero(v[4])}`,
      10,
      y
    );
    y += 7;
  });

  y += 8;

  doc.text("Pagos:",10,y);
  y += 8;

  pagos.slice(1)
  .filter(p=>String(p[1]) === String(clienteID))
  .forEach(p=>{
    doc.text(
      `${p[2] || ""} - ${dinero(p[3])} - ${p[4] || ""}`,
      10,
      y
    );
    y += 7;
  });

  doc.save("reporte-cliente.pdf");

}

function pdfFechas(){

  const desde = document.getElementById("desde").value;
  const hasta = document.getElementById("hasta").value;

  if(!desde || !hasta){
    alert("Seleccioná fecha desde y hasta.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 15;

  doc.setFontSize(16);
  doc.text("Reporte por Fechas",10,y);

  y += 12;

  doc.setFontSize(11);
  doc.text(`Desde: ${desde} - Hasta: ${hasta}`,10,y);

  y += 14;

  doc.text("Ventas:",10,y);
  y += 8;

  ventas.slice(1)
  .filter(v=>v[2] >= desde && v[2] <= hasta)
  .forEach(v=>{
    doc.text(
      `${v[2] || ""} - ${nombreCliente(v[1])} - ${v[3] || ""} - ${dinero(v[4])}`,
      10,
      y
    );
    y += 7;
  });

  y += 8;

  doc.text("Pagos:",10,y);
  y += 8;

  pagos.slice(1)
  .filter(p=>p[2] >= desde && p[2] <= hasta)
  .forEach(p=>{
    doc.text(
      `${p[2] || ""} - ${nombreCliente(p[1])} - ${dinero(p[3])}`,
      10,
      y
    );
    y += 7;
  });

  doc.save("reporte-fechas.pdf");

}

/* ================= INIT ================= */

load();

</script>

</body>
</html>
