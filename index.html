<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiónClientes Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root {
    --bg: #F0F4FA;
    --surface: #FFFFFF;
    --primary: #1B3A5C;
    --accent: #2E8BC0;
    --accent-light: #EBF5FB;
    --success: #27AE60;
    --warning: #E67E22;
    --danger: #E74C3C;
    --text: #1A2332;
    --text-muted: #6B7A90;
    --border: #DDE3ED;
    --shadow: 0 2px 12px rgba(27,58,92,0.08);
    --shadow-lg: 0 8px 32px rgba(27,58,92,0.14);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 260px; min-height: 100vh; background: var(--primary);
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 100;
    transition: transform .3s;
  }
  .sidebar.collapsed { transform: translateX(-260px); }
  .main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; transition: margin .3s; }
  .main.full { margin-left: 0; }

  /* ── SIDEBAR ── */
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .sidebar-logo h1 { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-logo p { color: rgba(255,255,255,.5); font-size: 11px; margin-top: 2px; }
  .nav { flex: 1; padding: 16px 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    color: rgba(255,255,255,.65); cursor: pointer;
    font-size: 14px; font-weight: 500; margin-bottom: 4px;
    transition: all .2s; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .nav-item.active { background: var(--accent); color: #fff; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-config {
    padding: 16px; border-top: 1px solid rgba(255,255,255,.1);
    font-size: 11px; color: rgba(255,255,255,.4);
  }
  .sidebar-config input {
    width: 100%; padding: 8px 10px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.07);
    color: rgba(255,255,255,.8); font-size: 11px; font-family: inherit; margin-top: 5px;
    outline: none;
  }
  .sidebar-config input::placeholder { color: rgba(255,255,255,.3); }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-toggle {
    background: none; border: none; cursor: pointer; color: var(--primary);
    padding: 6px; border-radius: 6px; display: flex; align-items: center;
  }
  .topbar-title { font-weight: 700; font-size: 16px; color: var(--primary); flex: 1; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px; border-radius: var(--radius-sm); font-size: 13px;
    font-weight: 600; cursor: pointer; border: none; font-family: inherit;
    transition: all .18s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2475a8; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #219150; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn svg { width: 15px; height: 15px; }

  /* ── CONTENT ── */
  .content { padding: 28px 28px 48px; flex: 1; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
  }
  .stat-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .stat-icon svg { width: 22px; height: 22px; }
  .stat-icon.blue { background: #EBF5FB; color: var(--accent); }
  .stat-icon.green { background: #EAFAF1; color: var(--success); }
  .stat-icon.orange { background: #FEF9E7; color: var(--warning); }
  .stat-icon.red { background: #FDEDEC; color: var(--danger); }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .stat-value { font-size: 24px; font-weight: 800; color: var(--primary); line-height: 1.1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── SECTION HEADER ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .section-title { font-size: 17px; font-weight: 700; color: var(--primary); }

  /* ── CLIENTES GRID ── */
  .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .client-card {
    background: var(--surface); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); cursor: pointer; transition: all .2s;
    border-left: 4px solid var(--border);
  }
  .client-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .client-card.debt-ok { border-left-color: var(--success); }
  .client-card.debt-warning { border-left-color: var(--warning); }
  .client-card.debt-danger { border-left-color: var(--danger); }
  .client-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .client-name { font-weight: 700; font-size: 15px; color: var(--primary); }
  .client-address { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .debt-badge {
    font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
  }
  .debt-badge.ok { background: #EAFAF1; color: var(--success); }
  .debt-badge.warning { background: #FEF9E7; color: var(--warning); }
  .debt-badge.danger { background: #FDEDEC; color: var(--danger); }
  .client-balance { font-size: 22px; font-weight: 800; margin: 8px 0 4px; }
  .client-balance.positive { color: var(--danger); }
  .client-balance.zero { color: var(--success); }
  .client-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); }
  .client-actions { display: flex; gap: 8px; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }

  /* ── DEBT SEMAPHORE ── */
  .semaphore { display: flex; gap: 4px; align-items: center; }
  .sem-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .3s; }
  .sem-dot.active.green { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .sem-dot.active.yellow { background: var(--warning); box-shadow: 0 0 6px var(--warning); }
  .sem-dot.active.red { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 6px var(--danger); } 50% { box-shadow: 0 0 14px var(--danger); } }

  /* ── TABLE ── */
  .table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--primary); color: #fff; padding: 12px 16px; text-align: left; font-weight: 600; font-size: 12px; letter-spacing: .4px; }
  tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--accent-light); }
  .type-badge {
    font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
  }
  .type-venta { background: #EBF5FB; color: var(--accent); }
  .type-pago { background: #EAFAF1; color: var(--success); }
  .type-nota { background: #F5EEF8; color: #8E44AD; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 200;
    padding: 16px;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--surface); border-radius: var(--radius); width: 100%;
    max-width: 520px; box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto;
  }
  .modal-lg { max-width: 760px; }
  .modal-xl { max-width: 96vw; max-height: 96vh; }
  .modal-header {
    padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 700; color: var(--primary); }
  .modal-close {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    padding: 6px; border-radius: 6px; display: flex; transition: color .2s;
  }
  .modal-close:hover { color: var(--danger); }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* ── FORM ── */
  .form-group { margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); font-family: inherit; font-size: 14px;
    color: var(--text); background: var(--surface); outline: none; transition: border .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: var(--surface); border-radius: var(--radius); padding: 18px 20px;
    box-shadow: var(--shadow); margin-bottom: 20px;
    display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
  }
  .filter-bar .form-group { margin-bottom: 0; flex: 1; min-width: 140px; }

  /* ── SEARCH ── */
  .search-box {
    position: relative; flex: 1; max-width: 320px;
  }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; }
  .search-box input { padding-left: 38px; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--primary); color: #fff; padding: 13px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
    animation: slideIn .3s; max-width: 320px;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  .toast.warning { background: var(--warning); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }

  /* ── ALERT BOX ── */
  .alert-box {
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px;
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;
  }
  .alert-box.warning { background: #FEF9E7; color: #935116; border: 1px solid #F9A825; }
  .alert-box.danger { background: #FDEDEC; color: #922B21; border: 1px solid var(--danger); }
  .alert-box.info { background: var(--accent-light); color: #1A5276; border: 1px solid #AED6F1; }
  .alert-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 22px; }
  .tab-btn {
    padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; background: none; color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: all .2s; font-family: inherit;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── LOADING ── */
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 40px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state svg { width: 56px; height: 56px; margin: 0 auto 16px; display: block; color: var(--border); }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* ── CUENTA CORRIENTE DETAIL ── */
  .cc-header {
    background: linear-gradient(135deg, var(--primary), #2E5A8E);
    border-radius: var(--radius); padding: 24px; color: #fff; margin-bottom: 20px;
  }
  .cc-name { font-size: 22px; font-weight: 800; }
  .cc-address { font-size: 13px; opacity: .7; margin-top: 4px; }
  .cc-balance-row { display: flex; gap: 32px; margin-top: 20px; flex-wrap: wrap; }
  .cc-balance-item label { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .5px; }
  .cc-balance-item .val { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .cc-balance-item .val.red { color: #FF8080; }
  .cc-balance-item .val.green { color: #7FEFB0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-260px); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .clients-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>Gestión<span>Pro</span></h1>
    <p>Administrador de Clientes</p>
  </div>
  <nav class="nav">
    <button class="nav-item active" onclick="showPage('dashboard')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="showPage('clientes')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Clientes
    </button>
    <button class="nav-item" onclick="showPage('movimientos')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Movimientos
    </button>
    <button class="nav-item" onclick="showPage('alertas')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      Alertas de Deuda
    </button>
  </nav>
  <div class="sidebar-config">
    <div style="font-weight:600;color:rgba(255,255,255,.6);margin-bottom:8px;">⚙️ Google Sheets ID</div>
    <input type="text" id="sheetId" placeholder="Pegar ID del Spreadsheet" oninput="saveConfig()">
    <div style="margin-top:8px;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:8px;">API Key</div>
    <input type="password" id="apiKey" placeholder="Google Sheets API Key" oninput="saveConfig()">
    <div style="margin-top:10px;">
      <button class="btn btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3);width:100%;" onclick="testConnection()">🔗 Probar Conexión</button>
    </div>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main class="main" id="main">
  <header class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <span class="topbar-title" id="pageTitle">Dashboard</span>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" onclick="syncData()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Sincronizar
      </button>
      <button class="btn btn-success btn-sm" onclick="openModal('modalCliente')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nuevo Cliente
      </button>
    </div>
  </header>

  <div class="content">

    <!-- ═══ DASHBOARD ═══ -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid" id="statsGrid"></div>

      <div class="section-header">
        <span class="section-title">⚠️ Clientes con Deuda Vencida</span>
        <button class="btn btn-outline btn-sm" onclick="showPage('alertas')">Ver todas</button>
      </div>
      <div id="dashboardAlerts"></div>

      <div class="section-header" style="margin-top:24px;">
        <span class="section-title">📋 Últimos Movimientos</span>
        <button class="btn btn-outline btn-sm" onclick="showPage('movimientos')">Ver todos</button>
      </div>
      <div class="table-wrap" id="dashboardMovs"></div>
    </div>

    <!-- ═══ CLIENTES ═══ -->
    <div class="page" id="page-clientes">
      <div class="section-header">
        <div class="search-box">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
          <input type="text" placeholder="Buscar cliente..." oninput="filterClients(this.value)" id="clientSearch">
        </div>
        <div style="display:flex;gap:8px;">
          <select onchange="filterClientsByStatus(this.value)" style="padding:8px 12px;font-size:13px;">
            <option value="">Todos los estados</option>
            <option value="ok">Al día</option>
            <option value="warning">En riesgo</option>
            <option value="danger">Vencido</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="openModal('modalCliente')">+ Nuevo</button>
        </div>
      </div>
      <div class="clients-grid" id="clientsGrid"></div>
    </div>

    <!-- ═══ MOVIMIENTOS ═══ -->
    <div class="page" id="page-movimientos">
      <div class="filter-bar">
        <div class="form-group" style="min-width:200px;">
          <label>Cliente</label>
          <select id="filterCliente">
            <option value="">Todos los clientes</option>
          </select>
        </div>
        <div class="form-group">
          <label>Desde</label>
          <input type="date" id="filterDesde">
        </div>
        <div class="form-group">
          <label>Hasta</label>
          <input type="date" id="filterHasta">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="filterTipo">
            <option value="">Todos</option>
            <option value="Venta">Ventas</option>

// ═══════════════════════════════════════════════════
//   HELPERS
// ═══════════════════════════════════════════════════
function genId(prefix) {
  return prefix + Date.now().toString(36).toUpperCase();
}

function fmt(n) {
  return '$' + (parseFloat(n)||0).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(d) {
  if(!d) return '-';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function getClientBalance(clientId) {
  return DB.movements
    .filter(m => m.clientId === clientId)
    .reduce((acc, m) => {
      if(m.tipo === 'Venta') return acc + parseFloat(m.monto||0);
      if(m.tipo === 'Pago' || m.tipo === 'Nota') return acc - parseFloat(m.monto||0);
      return acc;
    }, 0);
}

function getLastDebtDate(clientId) {
  const ventas = DB.movements.filter(m => m.clientId === clientId && m.tipo === 'Venta');
  if(!ventas.length) return null;
  return ventas.sort((a,b) => b.fecha.localeCompare(a.fecha))[0].fecha;
}

function getDebtAge(clientId) {
  const lastDate = getLastDebtDate(clientId);
  if(!lastDate) return 0;
  const balance = getClientBalance(clientId);
  if(balance <= 0) return 0;
  return Math.floor((Date.now() - new Date(lastDate)) / 86400000);
}

function getDebtStatus(clientId) {
  const client = DB.clients.find(c => c.id === clientId);
  const balance = getClientBalance(clientId);
  if(balance <= 0) return 'ok';
  const age = getDebtAge(clientId);
  const limit = client?.diasCredito || CONFIG.debtDays;
  if(age > limit) return 'danger';
  if(age > limit * 0.7) return 'warning';
  return 'ok';
}

function toast(msg, type='info') {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

      <div><div class="stat-label">Deuda Total</div><div class="stat-value" style="font-size:18px;">${fmt(totalDebt)}</div></div>

function renderClients(list) {
  const clients = list || DB.clients;
  const grid = document.getElementById('clientsGrid');
  if(!clients.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <h3>Sin clientes</h3><p>Agregá tu primer cliente con el botón "Nuevo"</p></div>`;
    return;
  }
  grid.innerHTML = clients.map(c => {
    const bal = getClientBalance(c.id);
    const st = getDebtStatus(c.id);
    const age = getDebtAge(c.id);
    const stLabel = { ok:'Al día', warning:'En riesgo', danger:'Vencido' }[st];
    const movCount = DB.movements.filter(m => m.clientId === c.id).length;
    return `<div class="client-card debt-${st}" onclick="openClientCC('${c.id}')">
      <div class="client-card-header">
        <div>
          <div class="client-name">${c.nombre}</div>
          <div class="client-address">📍 ${c.direccion}</div>
        </div>
        <span class="debt-badge ${st}">${stLabel}</span>
      </div>
      <div class="semaphore" style="margin-bottom:8px;">
        <span class="sem-dot ${st!=='ok'?'active green':''} ${st==='ok'?'active green':''}"></span>
        <span class="sem-dot ${st==='warning'||st==='danger'?'active yellow':''}"></span>
        <span class="sem-dot ${st==='danger'?'active red':''}"></span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:6px;">${age > 0 ? age+' días' : 'Sin deuda'}</span>
      </div>
      <div class="client-balance ${bal>0?'positive':'zero'}">${fmt(bal)}</div>
      <div class="client-meta">
        <span>📞 ${c.telefono||'-'}</span>
        <span>📋 ${movCount} mov.</span>
        <span>⏱ ${c.diasCredito}d crédito</span>
      </div>
      <div class="client-actions" onclick="event.stopPropagation()">
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="openClientCC('${c.id}')">📊 Cuenta</button>
        <button class="btn btn-success btn-sm" style="flex:1;" onclick="openMovForClient('${c.id}')">+ Movimiento</button>
        <button class="btn btn-outline btn-sm" onclick="editClient('${c.id}')">✏️</button>
        <button class="btn btn-sm" style="background:#FDEDEC;color:var(--danger);" onclick="deleteClient('${c.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function filterClients(q) {
  const filtered = DB.clients.filter(c =>
    c.nombre.toLowerCase().includes(q.toLowerCase()) ||
    c.direccion.toLowerCase().includes(q.toLowerCase()) ||
    (c.telefono||'').includes(q)
  );
  renderClients(filtered);
}

function filterClientsByStatus(st) {
  const filtered = st ? DB.clients.filter(c => getDebtStatus(c.id) === st) : DB.clients;
  renderClients(filtered);
}

  let running = 0;

    if(m.tipo === 'Venta') running += parseFloat(m.monto||0);
    else running -= parseFloat(m.monto||0);
    return { ...m, running };
  }).reverse();

  const body = document.getElementById('ccModalBody');

      <div class="cc-name">${client.nombre}</div>
      <div class="cc-address">📍 ${client.direccion} · 📞 ${client.telefono||'-'}</div>

        </div>
        <div class="cc-balance-item">
          <label>Crédito</label>
          <div class="val">${client.diasCredito}d</div>
        </div>
        <div class="cc-balance-item">
          <label>Estado</label>

        </tr>`).join('')}
      </tbody>
    </table></div>`}
  `;
  openModal('modalCC');
}

function openMovForClient(clientId) {
  closeModal('modalCC');
  populateClientSelect(clientId);
  openModal('modalMovimiento');
}

function openMovFromCC() {
  openMovForClient(currentClientId);
}

function editClient(id) {
  const c = DB.clients.find(x => x.id === id);
  if(!c) return;
  document.getElementById('modalClienteTitle').textContent = 'Editar Cliente';
  document.getElementById('clientId').value = c.id;
  document.getElementById('clientNombre').value = c.nombre;
  document.getElementById('clientTelefono').value = c.telefono||'';
  document.getElementById('clientDireccion').value = c.direccion;
  document.getElementById('clientEmail').value = c.email||'';
  document.getElementById('clientDiasCredito').value = c.diasCredito||30;
  document.getElementById('clientEstado').value = c.estado||'Activo';
  document.getElementById('clientNotas').value = c.notas||'';
  openModal('modalCliente');
}

function saveClient() {
  const nombre = document.getElementById('clientNombre').value.trim();
  const dir = document.getElementById('clientDireccion').value.trim();
  if(!nombre || !dir) { toast('Nombre y dirección son obligatorios', 'error'); return; }

  const id = document.getElementById('clientId').value || genId('C');
  const client = {
    id, nombre,
    telefono: document.getElementById('clientTelefono').value,
    direccion: dir,
    email: document.getElementById('clientEmail').value,
    diasCredito: parseInt(document.getElementById('clientDiasCredito').value)||30,
    estado: document.getElementById('clientEstado').value,
    notas: document.getElementById('clientNotas').value
  };

  const idx = DB.clients.findIndex(c => c.id === id);
  if(idx >= 0) DB.clients[idx] = client;
  else DB.clients.push(client);

  saveLocalData();
  syncToSheet('Clientes', clientToRow(client));
  closeModal('modalCliente');
  toast('Cliente guardado ✅', 'success');
  renderClients();
  document.getElementById('clientId').value = '';
  document.getElementById('modalClienteTitle').textContent = 'Nuevo Cliente';
  clearClientForm();
}

function clearClientForm() {
  ['clientNombre','clientTelefono','clientDireccion','clientEmail','clientNotas'].forEach(f => document.getElementById(f).value='');
  document.getElementById('clientDiasCredito').value = 30;
  document.getElementById('clientEstado').value = 'Activo';
}

function deleteClient(id) {
  if(!confirm('¿Eliminar este cliente y todos sus movimientos?')) return;
  DB.clients = DB.clients.filter(c => c.id !== id);
  DB.movements = DB.movements.filter(m => m.clientId !== id);
  saveLocalData();
  toast('Cliente eliminado', 'warning');
  renderClients();
}

// ═══════════════════════════════════════════════════
//   MOVIMIENTOS
// ═══════════════════════════════════════════════════
function populateClientSelect(selectedId) {
  const sel = document.getElementById('movCliente');
  sel.innerHTML = DB.clients.map(c => `<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.nombre}</option>`).join('');
  // Also filter dropdown
  const fsel = document.getElementById('filterCliente');
  fsel.innerHTML = '<option value="">Todos los clientes</option>' + DB.clients.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
}

function saveMovimiento() {
  const clientId = document.getElementById('movCliente').value;
  if(!clientId) { toast('Seleccioná un cliente', 'error'); return; }
  const tipo = document.getElementById('movTipo').value;
  const fecha = document.getElementById('movFecha').value;
  const monto = parseFloat(document.getElementById('movMonto').value)||0;
  const desc = document.getElementById('movDesc').value;
  const notas = document.getElementById('movNotas').value;
  if(!fecha) { toast('La fecha es obligatoria', 'error'); return; }
  if(tipo !== 'Nota' && monto <= 0) { toast('Ingresá un monto válido', 'error'); return; }

  const mov = { id: genId('M'), clientId, tipo, fecha, monto, desc, notas };
  DB.movements.push(mov);
  saveLocalData();
  syncToSheet('Movimientos', movToRow(mov));
  closeModal('modalMovimiento');
  toast(`${tipo} registrada ✅`, 'success');
  renderDashboard();
  document.getElementById('movMonto').value = '';
  document.getElementById('movDesc').value = '';
  document.getElementById('movNotas').value = '';
}

function deleteMovimiento(id, clientId) {
  if(!confirm('¿Eliminar este movimiento?')) return;
  DB.movements = DB.movements.filter(m => m.id !== id);
  saveLocalData();
  toast('Movimiento eliminado', 'warning');
  openClientCC(clientId);
}

function renderMovimientos() {
  populateClientSelect('');
  applyFilters();
}

function applyFilters() {
  const clientId = document.getElementById('filterCliente').value;
  const desde = document.getElementById('filterDesde').value;
  const hasta = document.getElementById('filterHasta').value;
  const tipo = document.getElementById('filterTipo').value;

  let filtered = DB.movements.filter(m => {
    if(clientId && m.clientId !== clientId) return false;
    if(desde && m.fecha < desde) return false;
    if(hasta && m.fecha > hasta) return false;
    if(tipo && m.tipo !== tipo) return false;
    return true;
  }).sort((a,b) => b.fecha.localeCompare(a.fecha));

  document.getElementById('movsTable').innerHTML = renderMovsTable(filtered);
}

function clearFilters() {
  document.getElementById('filterCliente').value = '';
  document.getElementById('filterTipo').value = '';
  setDefaultDates();
  applyFilters();
}

function renderMovsTable(movs) {
  if(!movs.length) return `<div class="empty-state"><h3>Sin movimientos</h3><p>No hay movimientos para el filtro seleccionado.</p></div>`;
  return `<table>
    <thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Descripción</th><th>Monto</th><th>Notas</th></tr></thead>
    <tbody>
      ${movs.map(m => {
        const client = DB.clients.find(c => c.id === m.clientId);
        return `<tr>
          <td>${fmtDate(m.fecha)}</td>
          <td style="font-weight:600;">${client?.nombre||m.clientId}</td>
          <td><span class="type-badge type-${m.tipo.toLowerCase()}">${m.tipo}</span></td>
          <td>${m.desc||'-'}</td>
          <td style="font-weight:700;color:${m.tipo==='Venta'?'var(--danger)':'var(--success)'};">${m.tipo==='Venta'?'+':'-'}${fmt(m.monto)}</td>
          <td style="font-size:12px;color:var(--text-muted);">${m.notas||''}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}



// ═══════════════════════════════════════════════════
//   ALERTAS
// ═══════════════════════════════════════════════════
function renderAlerts() {
  const container = document.getElementById('alertsContainer');
  const debtClients = DB.clients.filter(c => {
    const bal = getClientBalance(c.id);
    return bal > 0;
  }).sort((a,b) => getDebtAge(b.id) - getDebtAge(a.id));

  if(!debtClients.length) {
    container.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <h3>¡Sin alertas!</h3><p>Todos tus clientes están al día.</p></div>`;
    return;
  }

  container.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Cliente</th><th>Saldo Deudor</th><th>Días de Deuda</th><th>Límite Crédito</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>
      ${debtClients.map(c => {
        const bal = getClientBalance(c.id);
        const age = getDebtAge(c.id);
        const st = getDebtStatus(c.id);
        const stLabel = { ok:'✅ Al día', warning:'⚠️ En riesgo', danger:'🚨 Vencido' }[st];
        const stColor = { ok:'var(--success)', warning:'var(--warning)', danger:'var(--danger)' }[st];
        return `<tr>
          <td style="font-weight:600;">${c.nombre}<div style="font-size:11px;color:var(--text-muted);">${c.telefono||''}</div></td>
          <td style="font-weight:700;color:var(--danger);">${fmt(bal)}</td>
          <td style="font-weight:600;${age>=(c.diasCredito||CONFIG.debtDays)?'color:var(--danger)':''}">${age} días</td>
          <td>${c.diasCredito||CONFIG.debtDays} días</td>
          <td><span style="font-weight:600;color:${stColor};">${stLabel}</span></td>
          <td style="display:flex;gap:6px;">
            <button class="btn btn-sm btn-primary" onclick="openClientCC('${c.id}')">Ver cuenta</button>
            <button class="btn btn-sm btn-success" onclick="openMovForClient('${c.id}')">+ Pago</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function sendAlerts() {
  const overdue = DB.clients.filter(c => getDebtStatus(c.id) === 'danger');
  if(!overdue.length) { toast('No hay clientes con deuda vencida', 'info'); return; }
  toast(`Alertas enviadas a ${overdue.length} clientes (funcionalidad con Google Apps Script)`, 'warning');
}

// ═══════════════════════════════════════════════════
//   EXPORT PDF
// ═══════════════════════════════════════════════════
function exportClientPDF() {
  const client = DB.clients.find(c => c.id === currentClientId);
  if(!client) return;
  const movs = DB.movements.filter(m => m.clientId === currentClientId).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Header
  doc.setFillColor(27,58,92);
  doc.rect(0,0,210,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Cuenta Corriente', 14, 16);
  doc.setFontSize(12); doc.setFont('helvetica','normal');
  doc.text(client.nombre, 14, 24);
  doc.setFontSize(9);
  doc.text(`${client.direccion} · ${client.telefono||''}`, 14, 31);
  doc.text(`Generado: ${new Date().toLocaleDateString('es-AR')}`, 160, 31);

  // Balance summary
  const bal = getClientBalance(client.id);
  const age = getDebtAge(client.id);
  doc.setTextColor(0,0,0);
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Resumen', 14, 50);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(`Saldo actual: ${fmt(bal)}`, 14, 58);
  doc.text(`Días de deuda: ${age}`, 80, 58);
  doc.text(`Crédito: ${client.diasCredito} días`, 150, 58);

  // Table
  let running = 0;
  const rows = movs.map(m => {
    if(m.tipo==='Venta') running += parseFloat(m.monto||0);
    else running -= parseFloat(m.monto||0);
    return [fmtDate(m.fecha), m.tipo, m.desc||'-', m.tipo==='Venta'?'+'+fmt(m.monto):'-'+fmt(m.monto), fmt(running)];
  });

  doc.autoTable({
    startY: 65,
    head: [['Fecha','Tipo','Descripción','Monto','Saldo']],
    body: rows,
    headStyles: { fillColor: [46,139,192], textColor: 255, fontStyle:'bold' },
    alternateRowStyles: { fillColor: [235,245,251] },
    styles: { fontSize: 9 }
  });

  // Footer
  const pCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pCount;i++) {
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`GestiónPro · Pág ${i}/${pCount}`, 14, 290);
    doc.text(`Saldo final: ${fmt(bal)}`, 160, 290);
  }

  doc.save(`CC_${client.nombre.replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.pdf`);
  toast('PDF exportado ✅', 'success');
}

function exportFilteredPDF() {
  const clientId = document.getElementById('filterCliente').value;
  const desde = document.getElementById('filterDesde').value;
  const hasta = document.getElementById('filterHasta').value;
  const tipo = document.getElementById('filterTipo').value;

  let filtered = DB.movements.filter(m => {
    if(clientId && m.clientId !== clientId) return false;
    if(desde && m.fecha < desde) return false;
    if(hasta && m.fecha > hasta) return false;
    if(tipo && m.tipo !== tipo) return false;
    return true;
  }).sort((a,b) => a.fecha.localeCompare(b.fecha));

  if(!filtered.length) { toast('No hay movimientos para exportar', 'warning'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFillColor(27,58,92);
  doc.rect(0,0,210,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Reporte de Movimientos', 14, 16);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  const clientName = clientId ? DB.clients.find(c=>c.id===clientId)?.nombre||'' : 'Todos los clientes';
  doc.text(clientName, 14, 24);
  doc.text(`Período: ${desde?fmtDate(desde):'--'} al ${hasta?fmtDate(hasta):'--'}`, 14, 31);
  doc.text(`Generado: ${new Date().toLocaleDateString('es-AR')}`, 160, 31);

  const totalVentas = filtered.filter(m=>m.tipo==='Venta').reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const totalPagos = filtered.filter(m=>m.tipo==='Pago').reduce((s,m)=>s+parseFloat(m.monto||0),0);

  doc.setTextColor(0,0,0);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(`Total Ventas: ${fmt(totalVentas)}`, 14, 50);
  doc.text(`Total Pagos: ${fmt(totalPagos)}`, 80, 50);
  doc.text(`Diferencia: ${fmt(totalVentas-totalPagos)}`, 150, 50);
  doc.text(`Movimientos: ${filtered.length}`, 14, 57);

  const rows = filtered.map(m => {
    const client = DB.clients.find(c=>c.id===m.clientId);
    return [fmtDate(m.fecha), client?.nombre||m.clientId, m.tipo, m.desc||'-', (m.tipo==='Venta'?'+':'-')+fmt(m.monto)];
  });

  doc.autoTable({
    startY: 63,
    head: [['Fecha','Cliente','Tipo','Descripción','Monto']],
    body: rows,
    headStyles: { fillColor: [46,139,192], textColor:255, fontStyle:'bold' },
    alternateRowStyles: { fillColor: [235,245,251] },
    styles: { fontSize: 9 },
    didParseCell: (data) => {
      if(data.section==='body' && data.column.index===4) {
        data.cell.styles.textColor = data.cell.raw.startsWith('+')?[39,174,96]:[231,76,60];
        data.cell.styles.fontStyle = 'bold';
      }
    }
  });

  const pCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pCount;i++) {
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`GestiónPro · Pág ${i}/${pCount}`, 14, 290);
  }

  doc.save(`Movimientos_${desde||'inicio'}_${hasta||'fin'}.pdf`);
  toast('PDF de movimientos exportado ✅', 'success');
}

function clientToRow(c) {
  return [c.id, c.nombre, c.telefono||'', c.direccion, c.email||'', c.diasCredito, c.estado, c.notas||''];
}

function movToRow(m) {
  return [m.id, m.clientId, m.tipo, m.fecha, m.monto, m.desc||'', m.notas||''];
}

async function syncToSheet(sheetName, rowData) {
  if(!CONFIG.sheetId || !CONFIG.apiKey) return;
  // Using Google Apps Script Web App for write operations
  if(CONFIG.gasUrl) {
    try {
      await fetch(CONFIG.gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sheet: sheetName, row: rowData })
      });
    } catch(e) { console.warn('GAS sync failed:', e); }
  }
}

async function syncData() {
  toast('Sincronizando...', 'info');
  try {
    // Ejemplo de cómo traer la hoja 'Clientes'
    const res = await fetch(CONFIG.gasUrl + '?sheet=Clientes');
    const data = await res.json();
    
    if(data.values) {
      console.log("Datos recibidos:", data.values);
      // Aquí iría tu lógica para procesar los datos
      toast('Conexión exitosa ✅', 'success');
    }
  } catch(e) {
    console.error(e);
    toast('Error: ' + e.message, 'error');
  }
}

async function testConnection() {
  if(!CONFIG.sheetId || !CONFIG.apiKey) {
    toast('Ingresá el Sheet ID y API Key', 'warning'); return;
  }
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}?key=${CONFIG.apiKey}`);
    if(res.ok) toast('✅ Conexión exitosa a Google Sheets', 'success');
    else toast('❌ Error: verificá el ID y la API Key', 'error');
  } catch(e) {
    toast('❌ Error de conexión', 'error');
  }
}
